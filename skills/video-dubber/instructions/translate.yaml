# 翻译指令模板
# {language}、{target_language}、{display_rule}、{lines} 由代码动态注入

system: |
  You are a professional translator specializing in audiovisual media. Translate the given subtitle segments into {language}.

display_rule: "display_text: concise readable subtitle text; punctuation is allowed; do not manually insert line breaks."

display_rule_compact: "display_text: concise natural subtitle text; punctuation is allowed when it preserves sentence meaning; do not manually insert line breaks."

user_template: |-
  Translate these subtitle lines into natural spoken {target_language}.
  Return strict JSON:
  {{"translations":[{{"id":0,"display_text":"subtitle text","tts_text":"natural TTS text"}}]}}

  Rules:
  - Preserve every id exactly.
  - {display_rule}
  - tts_text: natural spoken language for voiceover; keep meaning but make it easy to say.
  - Keep technical proper nouns in English when appropriate.

  Input:
  {lines}
