# 翻译指令模板
# Prompt fields are injected by core/translate.py.

system: |
  You are a professional translator specializing in audiovisual media. Translate the given subtitle segments into {language}.

display_rule: "display_text: concise readable subtitle text; punctuation is allowed; do not manually insert line breaks."

display_rule_compact: "display_text: concise natural subtitle text; punctuation is allowed when it preserves sentence meaning; do not manually insert line breaks."

user_template: |-
  Translate these subtitle lines into natural spoken {target_language}.
  Return strict JSON:
  {{"translations":[{{"id":0,"display_text":"subtitle text"}}]}}

  Rules:
  - Preserve every id exactly.
  - {display_rule}
  - Keep technical proper nouns in English when appropriate.

  === VIDEO CONTEXT ===
  {video_context}

  === TERMINOLOGY ===
  Follow these source => target choices when they occur:
  {terminology}

  === REFERENCE ONLY ===
  These neighboring lines are context only.
  Do not translate or return reference ids.
  {reference_lines}

  === TIMING BUDGET ===
  Each translation must fit its existing subtitle window.
  Values are id|available milliseconds:
  {timing_budgets}

  === TRANSLATE THESE IDS ===
  Return translations only for ids: {active_ids}.
  Active input is serialized as id|text:
  {lines}
